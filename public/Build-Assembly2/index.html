<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unity WebGL | Test Assembly Station</title>
  <link rel="shortcut icon" href="/TemplateData/favicon.ico">
  <link rel="stylesheet" href="/TemplateData/style.css">
  <link rel="preload" href="Build/Build-Assembly2.loader.js" as="script">
</head>
<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width="960" height="540" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer">
      <div id="unity-logo-title-footer"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">Test Assembly Station</div>
    </div>
  </div>
  <script>
  (function(){
    var canvas = document.querySelector("#unity-canvas");
    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() { warningBanner.style.display = warningBanner.children.length ? "block" : "none"; }
      var div = document.createElement("div");
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type === "error") div.style.cssText = "background:#c00;padding:10px;";
      else if (type === "warning") { div.style.cssText = "background:#fc0;padding:10px;"; setTimeout(function(){ warningBanner.removeChild(div); updateBannerVisibility(); }, 5000); }
      updateBannerVisibility();
    }
    var buildUrl = "Build";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/Build-Assembly2.data.br",
      frameworkUrl: buildUrl + "/Build-Assembly2.framework.js.br",
      codeUrl: buildUrl + "/Build-Assembly2.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Riccardo Martella",
      productName: "Test Assembly Station",
      productVersion: "0.1.0",
      showBanner: unityShowBanner
    };
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement("meta");
      meta.name = "viewport";
      meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
      document.getElementsByTagName("head")[0].appendChild(meta);
      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
    }
    document.querySelector("#unity-loading-bar").style.display = "block";
    var script = document.createElement("script");
    script.src = buildUrl + "/Build-Assembly2.loader.js";
    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
      }).then(function(unityInstance) {
        document.querySelector("#unity-loading-bar").style.display = "none";
        var fullscreenBtn = document.querySelector("#unity-fullscreen-button");
        var container = document.querySelector("#unity-container");
        function toggleFullscreen() {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            container.classList.add("unity-fullscreen");
          } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            container.classList.remove("unity-fullscreen");
          }
        }
        fullscreenBtn.addEventListener("click", toggleFullscreen);
        document.addEventListener("fullscreenchange", function() {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) container.classList.remove("unity-fullscreen");
        });
        document.addEventListener("webkitfullscreenchange", function() {
          if (!document.webkitFullscreenElement) container.classList.remove("unity-fullscreen");
        });
      }).catch(function(message) { alert(message); });
    };
    document.body.appendChild(script);
  })();
  </script>
</body>
</html>
